<!DOCTYPE html>
<html>
<head>
<title>Login - DécorAI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">DécorAI</a>
  </div>
</nav>

<div class="container mt-5">
  <div class="card shadow p-4 col-md-5 mx-auto">
    <h3 class="text-center mb-3">Login</h3>

    <form onsubmit="return validateLogin()">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3">
      Don't have an account? <a href="register.html">Register</a>
    </p>
  </div>
</div>

<script>
function validateLogin(){
  var email = document.getElementById("loginEmail").value;
  var password = document.getElementById("loginPassword").value;

  var savedEmail = localStorage.getItem("userEmail");
  var savedPassword = localStorage.getItem("userPassword");

  if(email === savedEmail && password === savedPassword){
    alert("Login Successful!");
    window.location.href = "dashboard.html";
    return false;
  } else {
    alert("Invalid Credentials");
    return false;
  }
}
</script>

</body>
</html>
