<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customized Home Décor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">DécorAI</a>
    <div>
      <a href="about.html" class="btn btn-outline-secondary me-2">About</a>
      <a href="contact.html" class="btn btn-outline-secondary me-2">Contact</a>
      <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
      <a href="register.html" class="btn btn-primary">Register</a>
    </div>
  </div>
</nav>

<section class="hero text-center text-white d-flex align-items-center">
    <div class="container">
        <h1>Personalized Home Décor Ideas</h1>
        <p>Get décor recommendations based on your preferences</p>
        <a href="#preferences" class="btn btn-light mt-3">Get Started</a>
    </div>
</section>

<section id="preferences" class="container my-5">
    <h2 class="text-center mb-4">Choose Your Preferences</h2>

    <div class="row">
        <div class="col-md-4">
            <label>Room</label>
            <select id="room" class="form-select">
                <option>Living Room</option>
                <option>Bedroom</option>
            </select>
        </div>

        <div class="col-md-4">
            <label>Style</label>
            <select id="style" class="form-select">
                <option>Modern</option>
                <option>Minimal</option>
            </select>
        </div>

        <div class="col-md-4">
            <label>Budget</label>
            <select id="budget" class="form-select">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>
        </div>
    </div>

    <div class="text-center mt-4">
        <button class="btn btn-primary" onclick="getRecommendation()">Show Ideas</button>
    </div>
</section>

<section class="container my-5">
    <div id="result" class="row"></div>
</section>

<footer class="bg-dark text-white text-center p-3">
    © 2026 Customized Home Décor | Designed by Sakshi
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
